name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tests.yml'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'data/**'
  pull_request:
    paths:
      - '.github/workflows/tests.yml'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'data/**'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

      - name: Build binary (smoke test)
        run: go build -trimpath -ldflags="-s -w" -o glot .

      - name: Verify binary runs
        run: ./glot --version
