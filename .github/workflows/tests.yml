name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tests.yml'
      - 'glot.py'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - '.github/workflows/tests.yml'
      - 'glot.py'
      - 'tests/**'
      - 'pyproject.toml'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v
