name: Tests

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tests.yml'
      - '**.ts'
      - 'package.json'
      - 'bun.lock'
      - 'data/**'
  pull_request:
    paths:
      - '.github/workflows/tests.yml'
      - '**.ts'
      - 'package.json'
      - 'bun.lock'
      - 'data/**'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.18"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: node --test

      - name: Build binary (smoke test)
        run: bun run build

      - name: Verify binary runs
        run: ./dist/glot --version
